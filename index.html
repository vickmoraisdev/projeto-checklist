<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <title>CheckList</title>
</head>
<body>
    <div class="container">
        <header>
            <p>quicklist ✅ </p>
            <a href="">← Voltar</a>
            <h1>Compras da semana</h1>
        </header>
        <main>
            <form>
                <input type="text" id="item" placeholder="Adicione um novo item">
                <button type="submit" class="addItem">Adicionar item</button>
            </form>
            <ul>
                <li>
                    <input type="checkbox" class="checkbox">
                    <span>Pão de forma</span>
                    <button type="button" class="botaoLixoX">
                    <i class="ph ph-trash"></i>
                    </button>
                </li>
                <li>
                    <input type="checkbox" class="checkbox">
                    <span>Café preto</span>
                    <button type="button" class="botaoLixoX">
                    <i class="ph ph-trash"></i>
                    </button>
                </li>
                <li>
                    <input type="checkbox" class="checkbox">
                    <span>Suco de laranja</span>
                    <button type="button" class="botaoLixoX">
                    <i class="ph ph-trash"></i>
                    </button>
                </li>
                <li>
                    <input type="checkbox" class="checkbox">
                    <span>Biscoito</span>
                    <button type="button" class="botaoLixoX">
                    <i class="ph ph-trash"></i>
                    </button>
                </li>
            </ul>
            
            <div id="alertID">
                <i class="ph ph-warning-circle"></i>
                <span>O item foi removido da lista</span>
                <button type="button" id="xis">
                    <i class="ph ph-x"></i>
                </button>
            </div>
        </main>
    </div>
    <footer></footer>

    <script src="main.js"></script>
</body>
</html>
